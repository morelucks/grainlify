name: Smart Contracts CI

on:
  pull_request:
    paths:
      - "soroban/**"
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  push:
    branches:
      - main
      - develop
      - master
    paths:
      - "soroban/**"
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  soroban-rust:
    name: Soroban workspace (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none, wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            soroban/target/
          key: ${{ runner.os }}-soroban-cargo-${{ hashFiles('soroban/**/Cargo.lock', 'soroban/**/Cargo.toml', 'contracts/grainlify-core/**') }}
          restore-keys: |
            ${{ runner.os }}-soroban-cargo-

      - name: Build and test (soroban workspace)
        run: |
          cd soroban
          cargo build --workspace
          cargo test --workspace

  grainlify-core:
    name: grainlify-core (integration tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none, wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/grainlify-core/target/
          key: ${{ runner.os }}-grainlify-core-${{ hashFiles('contracts/grainlify-core/**/Cargo.lock', 'contracts/grainlify-core/**') }}
          restore-keys: |
            ${{ runner.os }}-grainlify-core-

      - name: Test grainlify-core
        run: |
          cd contracts/grainlify-core
          cargo test
