# Previously contained placeholder e2e steps; consolidated into real Rust checks.

name: Contract smoke

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]
  workflow_dispatch:

concurrency:
  group: contract-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none, wasm32-unknown-unknown
      - name: Build and test soroban workspace
        run: |
          cd soroban
          cargo build --workspace
          cargo test --workspace
